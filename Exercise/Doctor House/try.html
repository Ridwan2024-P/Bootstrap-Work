<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>

<style>
:root{
    --white:#fff;
    --accent:rgba(7,51,47,1);
    --accent-2:#ebedf0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


.calendar-section{
    width:100%;
    display:flex;
    justify-content:center;
    padding:30px 0;
}

.calendar-wrapper{
    width:340px;
    background:#fff;
    border-radius:20px;
    padding:20px;
    box-shadow:0 8px 25px rgba(0,0,0,.1);
}

.calendar-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.calendar-btn{
    width:36px;
    height:36px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    color:var(--accent);
    font-size:20px;
    user-select:none;
}

.calendar-btn:hover{
    background:var(--accent);
    color:#fff;
}

.header-display p{
    color:var(--accent);
    font-size:20px;
    font-weight:700;
}

.week,
.days{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
}

.week div{
    text-align:center;
    font-weight:600;
    color:#777;
    margin-bottom:10px;
}

.days div{
    width:40px;
    height:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    border-radius:50%;
    cursor:pointer;
    transition:.3s;
}

.days div:hover{
    background:var(--accent-2);
}

.current-date{
    background:var(--accent);
    color:#fff;
}

.selected-date{
    background:#f7a582 !important;
    color:#fff !important;
}

.display-selected{
    margin-top:20px;
    text-align:center;
    font-weight:600;
}
</style>






<script>
const display=document.querySelector(".display");
const days=document.querySelector(".days");
const previous=document.querySelector(".left");
const next=document.querySelector(".right");
const selected=document.querySelector(".selected");

let today=new Date();
let month=today.getMonth();
let year=today.getFullYear();

function renderCalendar(){

    days.innerHTML="";

    const firstDay=new Date(year,month,1);
    const lastDay=new Date(year,month+1,0);

    display.textContent=new Date(year,month).toLocaleString("en-US",{
        month:"long",
        year:"numeric"
    });

    for(let i=0;i<firstDay.getDay();i++){
        days.innerHTML+="<div></div>";
    }

    for(let i=1;i<=lastDay.getDate();i++){

        const cell=document.createElement("div");

        const current=new Date(year,month,i);

        cell.innerHTML=i;
        cell.dataset.date=current.toDateString();

        if(
            current.getDate()===new Date().getDate() &&
            current.getMonth()===new Date().getMonth() &&
            current.getFullYear()===new Date().getFullYear()
        ){
            cell.classList.add("current-date");
        }

        cell.onclick=function(){

            document.querySelectorAll(".days div").forEach(item=>{
                item.classList.remove("selected-date");
            });

            this.classList.add("selected-date");

            selected.innerHTML="Selected Date: "+this.dataset.date;

        }

        days.appendChild(cell);

    }

}

previous.onclick=function(){

    month--;

    if(month<0){
        month=11;
        year--;
    }

    renderCalendar();

}

next.onclick=function(){

    month++;

    if(month>11){
        month=0;
        year++;
    }

    renderCalendar();

}

renderCalendar();
</script>

</body>
</html>
