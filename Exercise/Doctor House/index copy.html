<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Hover Menu</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#002d3c;
}

/* Main Container */
#div1{
    width:600px;
    height:100px;
    border:20px solid #444;
    border-radius:100px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Phone Circle */
#divaa2{
    position:relative;
    width:80px;
    height:80px;
    border:5px solid orange;
    border-radius:50%;
    background:orange;
    overflow:hidden;
    transition:.6s;
}

#divaa2:hover{
    height:200px;
}

/* Left Extension */
#divaaa2{
    position:absolute;
    top:-5px;
    left:-25px;
    width:25px;
    height:80px;
    border:5px solid orange;
    border-radius:100px;
    background:orange;
    transition:.6s;
}

#divaa2:hover #divaaa2{
    height:200px;
}

/* Phone Icon */
#img3{
    position:absolute;
    left:10px;
    top:10px;
    width:60px;
}

/* Buttons */
#btnb1,
#btnb2{
    position:absolute;
    left:2px;
    width:75px;
    padding:6px;
    border:none;
    border-radius:20px;
    background:#555;
    color:transparent;
    cursor:pointer;
    transition:.6s;
}

/* Hidden Initially */
#btnb1{
    top:0;
    background:transparent;
}

#btnb2{
    top:0;
    background:transparent;
}

/* Hover Animation */
#divaa2:hover #btnb1{
    top:90px;
    color:#fff;
    background:#555;
}

#divaa2:hover #btnb2{
    top:140px;
    color:#fff;
    background:#555;
}
</style>

</head>
<body>

<div id="div1">

    <div id="divaa2">

        <img id="img3"
        src="https://cdn-icons-png.flaticon.com/512/159/159832.png"
        alt="Phone">

        <div id="divaaa2"></div>

        <input id="btnb1" type="button" value="Phone">

        <input id="btnb2" type="button" value="Call">

    </div>

</div>

</body>
</html>
