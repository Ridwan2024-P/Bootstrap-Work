<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Login Page</title>
</head>


<body>
    <div class="container-fluid">
      <div class="row min-vh-100 ">
       <div class="col-md-6 left-side d-none d-md-flex justify-content-center align-items-center position-relative">
            <img src="img/Frame (4).png" class="position-absolute top-0 end-0 m-4 corner-img" alt="">
            <img src="img/Frame.png" class="main-img img-fluid" alt="">
        </div>
            <div class="col-md-6 d-flex justify-content-center align-items-center min-vh-100 ">

                   <div class="border rounded-3 p-5  col-11 col-sm-9 col-md-8 col-lg-7  ">
                    <form action="">
                         <h5 class="text-center fw-bold">Sign Up To Doc House</h5>
                         <div class="form-group mt-4">
                            <label class="control-label fw-semibold mb-2 " for="email">Name</label>
                            <div class="">
                            <input type="text" class="form-control p-3  bg-light rounded-3" id="email" placeholder="Enter Your Name">
                            </div>
                        </div>
                        <div class="form-group mt-4">
                            <label class="control-label fw-semibold mb-2 " for="email">Username </label>
                            <div class="">
                            <input type="text" class="form-control p-3  bg-light rounded-3" id="email" placeholder="Enter Your UserName">
                            </div>
                        </div>
                        <div class="form-group mt-4">
                            <label class="control-label fw-semibold mb-2 " for="email">Email Address</label>
                            <div class="">
                            <input type="email" class="form-control p-3  bg-light rounded-3" id="email" placeholder="Enter Your email">
                            </div>
                        </div>
                        <div class="form-group mt-3">
                           <div class="d-flex justify-content-between align-items-center mb-2">
                            <label for="pwd" class="fw-semibold mb-0">Password</label>
                        </div>

                        <input
                            type="password"
                            class="form-control p-3 bg-light rounded-3"
                            id="pwd"
                            placeholder="Enter Your Password">
                            
                        </div>
                        <div class="form-group">
                            
                            <input type="submit" class="btn p-2 col-md-12 mt-3 fw-bold text-white fs-16 mb-3" value="Create Account" style="background: rgba(247, 165, 130, 1);">
                           
                        </div>

                        <a href="login.html" class="text-secondary text-secondary text-decoration-none p-0 p-md-0 d-block text-center ">Already registered? <span class="fw-bold fs-6 small" style="color: rgba(247, 165, 130, 1);">SIGN IN</span></a>
                       
                       
                    </form>
                    </div>
               
            </div>
        </div>
    </div>


   
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
