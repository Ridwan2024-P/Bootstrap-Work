<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Exercise -One</title>
</head>
<body>

   <div class="container mt-3">
    <div class="row" justify-content-center>
        <div class="col-md-6">
            <form action=""> 
                    <div class="mb-3"> <label class="form-label" for="u_name">User Name</label>
                    <input class="form-control" type="text" name="u_name" id="u_name" required></div>
                    <div class="mb-3">
                        <label class="form-label" for="u_comment">Comment</label>
                        <textarea class="form-control" name="u_comment" id="u_comment" rows="6"></textarea>
                    </div>
                     <button class="btn btn-success" type="submit">Submit</button>  

                     <div class="mb-3"> <label class="form-label" for="u_name">User Name</label>
                    <input class="form-control form-control-lg" type="text" name="u_name" id="u_name" required></div>
                    <div class="mb-3"> <label class="form-label" for="u_name">User Name</label>
                    <input class="form-control form-control-sm" type="text" name="u_name" id="u_name" required></div>
                    <div class="mb-3"> <label class="form-label" for="u_name">User Name</label>
                    <input class="form-control" type="text" name="u_name" id="u_name" required value="hello" readonly></div>

                    <div class="mb-3"> <label class="form-label" for="u_name">User Name</label>
                    <input class="form-control" type="file" name="u_name" id="u_name" required></div>
                    <div class="mb-3"> <label class="form-label" for="u_name">User Name</label>
                    <input class="form-control" type="file" name="u_name" id="u_name" disabled></div>
                    <div class="mb-3"> <label class="form-label" for="u_name">User Name</label>
                    <input class="form-control-color form-control-sm" type="color" name="u_name" id="u_name" required></div>
                    <div class="mb-3"> <label class="form-label" for="u_name">User Name</label>
                    <input class="form-control" list="detalistOptions" name="u_name" id="details"  required placeholder="typing ">
                        <details id="detalistOptions">
                            <option value="New Work">
                        </details>
                </div>
                 <div class="mb-3">
                    <label for="countries" class="form-label">Country</label>
                    <select name="countries" id="countries">
                        <option value="India" selected> India</option>
                         <option value="India"> India</option>
                          <option value="India" > Bangladesh</option>
                    </select>
                 </div>
            </form>
        </div>
    </div>
   </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
