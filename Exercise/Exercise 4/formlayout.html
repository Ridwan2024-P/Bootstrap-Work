<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Exercise -One</title>
</head>
<body>

   <div class="container mt-3">
    <div class="row" justify-content-center>
        <div class="col-md-4">
            <form action="">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="first_name" class="form-label">First Name</label>
                        <input type="text" name="first_name" id="first_name" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label for="last_name" class="form-label">Last Name</label>
                        <input type="text" name="last_name" id="Last_name" class="form-control">
                    </div>
                </div>
                 <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" name="email" id="email" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label for="Phone" class="form-label">Phone Name</label>
                        <input type="tel" name="Phone" id="Phone" class="form-control">
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-12">
                        <label for="address" class="form-label">Address</label>
                        <textarea name="address" cols="30" rows="10" class="form-control" placeholder="1234 min st"></textarea>
                    </div>
                </div>
                 <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="city" class="form-label">City</label>
                        <input type="text" name="city" id="city" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label for="state" class="form-label">State</label>
                        <select name="state" id="state" class="form-select">
                            <option value="Lalmatia" selected>Lalmatia</option>
                            <option value="Bashundhara">Bashundhara</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="pin" class="form-label">Pin</label>
                        <input type="number" class="form-control">
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-12">
                        <input type="checkbox" class="form-check-input">
                        <label for="CheckBox" class="form-check-label">Check Me Out</label>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-12">
                        <button class="btn btn-success">Sign-Up</button>
                    </div>
                </div>
                
            </form>
        </div>
    </div>
   </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
