<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <title>Exercise -One</title>
</head>
<body>

   <div class="container mt-3">
    <div class="row" justify-content-center>
        <div class="col-md-4">
           <form action="">
             <div class="row mb-2 gy-2">
                <label for="email" class="col-md-2 col-form-label ">Email</label>
                <div class="col-md-10 gy-2">
                    <input type="email" class="form-control from-control-sm" placeholder="Enter Your Email">
                </div>
             </div>
             <div class="row mb-2 gy-5">
                <label for="Username" class="col-md-2 col-form-label ">UserName</label>
                <div class="col-md-10">
                    <input type="email" class="form-control from-control-sm" placeholder="Enter Your Name">
                </div>
             </div>
             <div class="row mb-2 gy-2">
                <label for="Username" class="col-md-2 col-form-label ">Password</label>
                <div class="col-md-5">
                    <input type="password" class="form-control from-control-sm" placeholder="Enter Your Password">
                </div>
                <div class="col-md-5">
                    <input type="password" class="form-control from-control-sm" placeholder="Re Password">
                </div>
             </div>
             <div class="row mb-2 offset-md-2">
                <div class="col-md-10">
                    <input type="submit" class="btn btn-success" value="Sign-Up">
                </div>
             </div>
           </form>
        </div>
    </div>
   </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
